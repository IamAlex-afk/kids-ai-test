<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a18"/>
      <stop offset="60%" style="stop-color:#0f0a24"/>
      <stop offset="100%" style="stop-color:#1a0a2e"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c084fc"/>
      <stop offset="50%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#38bdf8"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Grid lines (subtle) -->
  <g stroke="rgba(139,92,246,0.06)" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="150" y1="0" x2="150" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="450" y1="0" x2="450" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="750" y1="0" x2="750" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1050" y1="0" x2="1050" y2="630"/>
  </g>

  <!-- Neural network nodes (decorative left) -->
  <g filter="url(#softGlow)">
    <circle cx="80" cy="180" r="5" fill="rgba(139,92,246,0.6)"/>
    <circle cx="160" cy="280" r="4" fill="rgba(96,165,250,0.5)"/>
    <circle cx="60" cy="380" r="6" fill="rgba(139,92,246,0.4)"/>
    <circle cx="180" cy="450" r="3" fill="rgba(56,189,248,0.6)"/>
    <circle cx="100" cy="520" r="4" fill="rgba(139,92,246,0.5)"/>
    <line x1="80" y1="180" x2="160" y2="280" stroke="rgba(139,92,246,0.2)" stroke-width="1.5"/>
    <line x1="160" y1="280" x2="60" y2="380" stroke="rgba(96,165,250,0.2)" stroke-width="1.5"/>
    <line x1="60" y1="380" x2="180" y2="450" stroke="rgba(139,92,246,0.2)" stroke-width="1.5"/>
    <line x1="180" y1="450" x2="100" y2="520" stroke="rgba(56,189,248,0.2)" stroke-width="1.5"/>
    <line x1="80" y1="180" x2="60" y2="380" stroke="rgba(139,92,246,0.1)" stroke-width="1"/>
  </g>

  <!-- Neural network nodes (decorative right) -->
  <g filter="url(#softGlow)">
    <circle cx="1120" cy="150" r="5" fill="rgba(96,165,250,0.6)"/>
    <circle cx="1050" cy="260" r="4" fill="rgba(139,92,246,0.5)"/>
    <circle cx="1140" cy="360" r="6" fill="rgba(56,189,248,0.4)"/>
    <circle cx="1030" cy="460" r="3" fill="rgba(139,92,246,0.6)"/>
    <circle cx="1110" cy="540" r="4" fill="rgba(96,165,250,0.5)"/>
    <line x1="1120" y1="150" x2="1050" y2="260" stroke="rgba(96,165,250,0.2)" stroke-width="1.5"/>
    <line x1="1050" y1="260" x2="1140" y2="360" stroke="rgba(139,92,246,0.2)" stroke-width="1.5"/>
    <line x1="1140" y1="360" x2="1030" y2="460" stroke="rgba(56,189,248,0.2)" stroke-width="1.5"/>
    <line x1="1030" y1="460" x2="1110" y2="540" stroke="rgba(139,92,246,0.2)" stroke-width="1.5"/>
  </g>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#titleGrad)"/>

  <!-- Robot icon area (glow behind) -->
  <circle cx="600" cy="210" r="80" fill="rgba(139,92,246,0.08)"/>
  <circle cx="600" cy="210" r="60" fill="rgba(139,92,246,0.06)"/>

  <!-- Robot SVG (inline) -->
  <g transform="translate(555, 148)" font-family="system-ui">
    <!-- Robot face -->
    <rect x="5" y="0" width="80" height="68" rx="14" fill="#1e1b3a" stroke="#7c3aed" stroke-width="2"/>
    <!-- Eyes -->
    <ellipse cx="28" cy="28" rx="11" ry="9" fill="#38bdf8" opacity="0.9"/>
    <ellipse cx="62" cy="28" rx="11" ry="9" fill="#38bdf8" opacity="0.9"/>
    <ellipse cx="28" cy="28" rx="5" ry="5" fill="#0ea5e9"/>
    <ellipse cx="62" cy="28" rx="5" ry="5" fill="#0ea5e9"/>
    <!-- Mouth -->
    <rect x="20" y="50" width="50" height="8" rx="4" fill="rgba(56,189,248,0.4)"/>
    <rect x="24" y="52" width="8" height="4" rx="2" fill="#38bdf8"/>
    <rect x="36" y="52" width="8" height="4" rx="2" fill="#38bdf8"/>
    <rect x="48" y="52" width="8" height="4" rx="2" fill="#38bdf8"/>
    <!-- Antenna -->
    <line x1="45" y1="0" x2="45" y2="-16" stroke="#8b5cf6" stroke-width="2.5"/>
    <circle cx="45" cy="-20" r="5" fill="#c084fc"/>
  </g>

  <!-- Main title -->
  <text x="600" y="335" text-anchor="middle"
        font-family="'Segoe UI', system-ui, -apple-system, sans-serif"
        font-size="72" font-weight="900" letter-spacing="-1"
        fill="url(#titleGrad)" filter="url(#glow)">Kids AI Test</text>

  <!-- Subtitle -->
  <text x="600" y="390" text-anchor="middle"
        font-family="'Segoe UI', system-ui, sans-serif"
        font-size="26" font-weight="600" letter-spacing="1"
        fill="rgba(255,255,255,0.85)">Free AI Literacy for Children · Ages 3 – 17</text>

  <!-- Feature pills -->
  <g font-family="'Segoe UI', system-ui, sans-serif" font-size="18" font-weight="600">
    <!-- Pill 1 -->
    <rect x="220" y="428" width="160" height="36" rx="18" fill="rgba(139,92,246,0.2)" stroke="rgba(139,92,246,0.5)" stroke-width="1.5"/>
    <text x="300" y="452" text-anchor="middle" fill="#c084fc">📖 Learn</text>
    <!-- Pill 2 -->
    <rect x="400" y="428" width="160" height="36" rx="18" fill="rgba(56,189,248,0.15)" stroke="rgba(56,189,248,0.45)" stroke-width="1.5"/>
    <text x="480" y="452" text-anchor="middle" fill="#7dd3fc">🎮 Play</text>
    <!-- Pill 3 -->
    <rect x="580" y="428" width="160" height="36" rx="18" fill="rgba(34,197,94,0.15)" stroke="rgba(34,197,94,0.45)" stroke-width="1.5"/>
    <text x="660" y="452" text-anchor="middle" fill="#86efac">🃏 Card</text>
    <!-- Pill 4 -->
    <rect x="760" y="428" width="220" height="36" rx="18" fill="rgba(251,191,36,0.12)" stroke="rgba(251,191,36,0.4)" stroke-width="1.5"/>
    <text x="870" y="452" text-anchor="middle" fill="#fde68a">✅ No Sign-Up</text>
  </g>

  <!-- Language flags row -->
  <text x="600" y="530" text-anchor="middle"
        font-family="'Segoe UI', system-ui, sans-serif"
        font-size="22" fill="rgba(255,255,255,0.35)" letter-spacing="2">
    EN · RU · DE · ES · FR · HI · ID · PT · TR · VI
  </text>

  <!-- URL bar -->
  <rect x="350" y="556" width="500" height="34" rx="17" fill="rgba(139,92,246,0.1)" stroke="rgba(139,92,246,0.3)" stroke-width="1"/>
  <text x="600" y="579" text-anchor="middle"
        font-family="monospace" font-size="15" fill="rgba(139,92,246,0.8)">
    iamalex-afk.github.io/kids-ai-test
  </text>

  <!-- Bottom accent bar -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#titleGrad)"/>
</svg>
